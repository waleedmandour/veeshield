name: Release New Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version type (patch, minor, major)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Get current version
        id: current_version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Bump version
        run: npm version ${{ github.event.inputs.version }} -m "chore: bump version to %s"

      - name: Get new version
        id: new_version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Push changes
        run: |
          git push origin master
          git push --tags origin master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.new_version.outputs.version }}
          name: VeeShield v${{ steps.new_version.outputs.version }}
          body: |
            ## 🛡️ VeeShield v${{ steps.new_version.outputs.version }}
            
            ### What's Changed
            
            See [commits](https://github.com/waleedmandour/veeshield/compare/v${{ steps.current_version.outputs.version }}...v${{ steps.new_version.outputs.version }}) for details.
            
            ### Installation
            
            Download the Windows installer from the assets below.
            
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "✅ Released version: v${{ steps.new_version.outputs.version }}"
          echo "📦 Download: https://github.com/waleedmandour/veeshield/releases/tag/v${{ steps.new_version.outputs.version }}"
