name: Build and Release VeeShield

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npx next build

      - name: Build Electron Windows
        run: npx electron-builder --win --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build outputs
        run: Get-ChildItem -Path dist -Recurse -File | Select-Object Name, Length

      - name: Upload all dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VeeShield-Windows-Build
          path: dist/
          if-no-files-found: warn

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows build artifacts
        uses: actions/download-artifact@v4
        with:
          name: VeeShield-Windows-Build
          path: ./release-artifacts/

      - name: List release artifacts
        run: find ./release-artifacts -type f -name "*.exe" -o -name "*.zip" | head -20

      - name: Collect release files
        run: |
          mkdir -p ./to-release
          # Copy NSIS installer
          cp ./release-artifacts/*.exe ./to-release/ 2>/dev/null || true
          # Copy portable zip
          cp ./release-artifacts/*.zip ./to-release/ 2>/dev/null || true
          # Copy blockmap for auto-update
          cp ./release-artifacts/*.exe.blockmap ./to-release/ 2>/dev/null || true
          # Copy latest.yml for auto-update
          cp ./release-artifacts/latest*.yml ./to-release/ 2>/dev/null || true
          ls -la ./to-release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./to-release/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
